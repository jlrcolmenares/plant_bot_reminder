name: Plant Watering Reminder

on:
  schedule:
    # Ejecutar diariamente a las 7:00 UTC (8:00 AM Madrid en invierno, 9:00 AM en verano)
    - cron: '0 7 * * *'
  workflow_dispatch:  # Permite ejecucion manual desde GitHub

jobs:
  remind:
    runs-on: ubuntu-latest

    permissions:
      contents: write  # Necesario para hacer commit del watering_log.json

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run plant reminder bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        working-directory: src
        run: python plant_reminder.py

      - name: Check for changes in watering log
        id: check_changes
        run: |
          if git diff --quiet data/watering_log.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push watering log
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/watering_log.json
          git commit -m "Update watering log [skip ci]"
          git push
